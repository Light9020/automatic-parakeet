<script src="https://checkout.flutterwave.com/v3.js"></script>

<script>
/* ═══════════════════════════════════
   MODAL & PAYMENT LOGIC
═══════════════════════════════════ */
const overlay = document.getElementById('modalOverlay');
let currentPrice = 0;
let currentService = "";

function openManual(name, price, badgeClass, btnClass, stripeClass) {
    document.getElementById('mTitle').innerText = name;
    document.getElementById('mPriceBadge').innerText = price;
    document.getElementById('mPriceBadge').className = 'price-badge ' + badgeClass;
    document.getElementById('modalStripe').className = 'modal-stripe ' + stripeClass;
    
    currentService = name;
    currentPrice = parseInt(price.replace(/[^0-9]/g, ''));
    overlay.classList.add('open');
}

function closeModal() {
    overlay.classList.remove('open');
}

// Close modal when clicking outside
window.onclick = function(event) {
    if (event.target == overlay) closeModal();
}

/* ═══════════════════════════════════
   FLUTTERWAVE INTEGRATION
═══════════════════════════════════ */
document.getElementById('paymentForm').addEventListener('submit', function(e) {
    e.preventDefault();
    
    const email = document.getElementById('email').value;
    const phone = document.getElementById('phone').value;
    const name = document.getElementById('fullName').value;

    FlutterwaveCheckout({
      public_key: "FLWPUBK-c42d5a8cbcbaa5613e1ee626b0a0accc-X",
      tx_ref: "MV-" + Date.now(),
      amount: currentPrice,
      currency: "NGN",
      payment_options: "card, banktransfer, ussd",
      customer: {
        email: email,
        phone_number: phone,
        name: name,
      },
      customizations: {
        title: "Meldverify",
        description: "Payment for " + currentService,
        logo: "https://your-logo-url.com/logo.png",
      },
      callback: function (data) {
        // This runs after successful payment
        console.log("Payment successful", data);
        alert("Payment Successful! We will process your " + currentService + " shortly.");
        closeModal();
        // Here you would typically send data to your backend/WhatsApp
      },
      onclose: function() {
        console.log("Payment window closed");
      }
    });
});
</script>
